<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Register - QuickMatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark">
    <header>
        <nav>
            <div class="logo">
                <span class="heart">❤️</span> QuickMatch
            </div>
            <div class="nav-right">
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme">🌙</button>
                <button class="menu-btn" onclick="toggleMenu()" title="Menu">☰</button>
            </div>
            <div class="menu" id="menu">
                <a href="index.html">🏠 Home</a>
                <a href="register.html">📝 Register</a>
                <a href="admin-register.html">🔐 Admin Register</a>
                <a href="about.html">ℹ️ About</a>
                <a href="vip.html">⭐ VIP</a>
            </div>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>Admin Registration</h1>
            <p class="tagline">Create a new administrator account</p>
        </div>
    </div>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Admin Sign Up</h1>
            </div>
            <form id="admin-register-form" class="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="text" id="phone" required>
                    </div>
                    <div class="form-group photo-upload">
                        <label for="profilePhoto" class="photo-upload-btn">
                            <div class="photo-placeholder"><i class="fas fa-cloud-upload-alt"></i></div>
                            <span>Upload Profile Photo</span>
                        </label>
                        <input type="file" id="profilePhoto" accept="image/*" style="display:none;" required>
                        <img id="photoPreview" class="photo-preview" />
                    </div>
                </div>
                <button type="submit" class="btn-register">Register as Admin</button>
                <p id="register-error" style="color:red; margin-top:10px;"></p>
            </form>
        </div>
    </div>

    <script>
        // copy toggleTheme/toggleMenu and event script from other pages
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.classList.toggle('show');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.classList.add(savedTheme);
        });

        // admin registration logic
        document.getElementById('profilePhoto').addEventListener('change', function(){
            const [file] = this.files;
            if(file){
                document.getElementById('photoPreview').src = URL.createObjectURL(file);
            }
        });

        document.getElementById('admin-register-form').addEventListener('submit', async function(e){
            e.preventDefault();
            const form = e.target;
            const data = new FormData();
            ['firstName','lastName','email','password','username','country','phone','profilePhoto'].forEach(id=>{
                const el=document.getElementById(id);
                if(el.type==='file') data.append('profilePhoto', el.files[0]);
                else data.append(id, el.value);
            });
            try{
                const res = await fetch('http://localhost:3001/admin/register',{
                    method:'POST',
                    body:data
                });
                const json = await res.json();
                if(res.ok){
                    alert('Admin account created. Please login.');
                    window.location.href='admin.html';
                }else{
                    document.getElementById('register-error').textContent = json.error || 'Failed';
                }
            }catch(err){
                document.getElementById('register-error').textContent = 'Network error';
            }
        });

        // secret admin access removed on admin register page
    </script>
</body>
</html>
